<!-- ATAK #2: ANTI-SERVICE-WORKER + cache cleanup (najwczesniej w head, BEFORE wszelkie inne scripty) -->
<script>
(function(){
  // Wykonaj BEZ czekania - od razu unregister wszystkie SW dla tej domeny
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      if (regs.length > 0) {
        console.warn('[demo cache-buster] Found '+regs.length+' service workers - unregistering ALL');
        regs.forEach(function(r){ r.unregister(); });
      }
    }).catch(function(e){});
  }
  // Wyczysc wszystkie Cache Storage entries (Workbox, manual cache itd.)
  if ('caches' in window) {
    caches.keys().then(function(names){
      if (names.length > 0) {
        console.warn('[demo cache-buster] Clearing '+names.length+' cache storage entries');
        names.forEach(function(n){ caches.delete(n); });
      }
    }).catch(function(e){});
  }
})();
</script>

<!-- ━━━ AUDIO PLAYER (inline, niezalezny od React) z palette-aware colors ━━━ -->
<div id="bg-audio-wrap" role="region" aria-label="Muzyka w tle">
  <audio id="bg-audio-el" src="/audio/demo.mp3" loop preload="none" playsinline crossorigin="anonymous"></audio>
  <button id="bg-audio-btn" type="button" aria-label="Włącz muzykę" title="Włącz muzykę">
    <svg id="bg-audio-icon-play" width="22" height="22" viewBox="0 0 24 24"><polygon class="audio-icon-shape" points="7,4 20,12 7,20" stroke-width="1.5"/></svg>
    <svg id="bg-audio-icon-pause" width="22" height="22" viewBox="0 0 24 24" style="display:none"><rect class="audio-icon-shape" x="6" y="4" width="4" height="16" rx="1" stroke-width="2" fill="none"/><rect class="audio-icon-shape" x="14" y="4" width="4" height="16" rx="1" stroke-width="2" fill="none"/></svg>
  </button>
  <p id="bg-audio-label">Włącz muzykę</p>
</div>
<script>
(function(){
  var audio=document.getElementById('bg-audio-el');
  var btn=document.getElementById('bg-audio-btn');
  var iconPlay=document.getElementById('bg-audio-icon-play');
  var iconPause=document.getElementById('bg-audio-icon-pause');
  var wrap=document.getElementById('bg-audio-wrap');
  var label=document.getElementById('bg-audio-label');

  // ━━━ AUDIO toggle ━━━
  btn.addEventListener('click',function(){
    wrap.classList.add('no-pulse');
    if(audio.paused){
      audio.volume=0.35;
      var p=audio.play();
      if(p&&p.then) p.then(function(){
        iconPlay.style.display='none';iconPause.style.display='block';
        btn.setAttribute('aria-label','Wycisz muzykę');btn.setAttribute('title','Wycisz muzykę');
        if(label) label.textContent='Muzyka instrumentalna';
      }).catch(function(e){console.warn('[audio] play blocked:',e)});
    } else {
      audio.pause();
      iconPlay.style.display='block';iconPause.style.display='none';
      btn.setAttribute('aria-label','Włącz muzykę');btn.setAttribute('title','Włącz muzykę');
      if(label) label.textContent='Włącz muzykę';
    }
  });
  setTimeout(function(){wrap.classList.add('no-pulse');wrap.classList.add('no-label');},8000);

  // ━━━ PALETTE SYNC v3: aggressive multi-source detection + tolerant match ━━━
  // 4 palety demo (z compiled JS):
  var PALETTES=[
    {name:'Leśna zieleń',     deep:[30,43,31],  gold:'#C9A96E'},
    {name:'Granat + róż',     deep:[17,29,43],  gold:'#D4A0A0'},
    {name:'Bordo + kość',     deep:[53,16,29],  gold:'#C8A87C'},
    {name:'Rdzawa terracotta',deep:[74,30,21],  gold:'#B85F2E'}
  ];
  function hexToRgb(h){h=h.replace('#','');return parseInt(h.substr(0,2),16)+','+parseInt(h.substr(2,2),16)+','+parseInt(h.substr(4,2),16);}
  function parseRgb(s){
    var m=s.match(/rgba?\(\s*(\d+)[,\s]+(\d+)[,\s]+(\d+)/);
    return m ? [+m[1],+m[2],+m[3]] : null;
  }
  // TOLERANT MATCH: znajdz palete ktora ma najblizszy deep do podanego rgb
  function findClosestPalette(rgb){
    var best=null, minDist=Infinity;
    PALETTES.forEach(function(p){
      var d=Math.abs(rgb[0]-p.deep[0])+Math.abs(rgb[1]-p.deep[1])+Math.abs(rgb[2]-p.deep[2]);
      if(d<minDist){minDist=d;best=p;}
    });
    return minDist<=60 ? best : null; // tolerancja 60 jednostek total (ok 20 per channel)
  }
  // MULTI-SOURCE SCAN: znajdz dominujacy ciemny kolor (deep) na stronie
  // Sprawdz nav, sekcje, footer - jakiekolwiek element z ciemnym bg
  function scanForDeepColor(){
    // Lista kandydatow: nav, footer, ciemne sekcje, ceremony cards
    var candidates=[
      document.querySelector('#root nav'),
      document.querySelector('body nav'),
      document.querySelector('nav'),
      document.querySelector('#root footer'),
      document.querySelector('footer')
    ].filter(Boolean);
    // Plus: pierwsze 20 dziadow z computed bg kolorem (skanowanie)
    if(candidates.length===0){
      var all=document.querySelectorAll('#root *');
      for(var i=0;i<Math.min(all.length,30);i++){
        var bg=getComputedStyle(all[i]).backgroundColor;
        if(bg && bg!=='rgba(0, 0, 0, 0)' && bg!=='transparent'){
          var rgb=parseRgb(bg);
          // Tylko ciemne (suma RGB < 250 = ciemne kolory)
          if(rgb && rgb[0]+rgb[1]+rgb[2]<250) candidates.push(all[i]);
        }
      }
    }
    // Sprawdz background kazdego kandydata, znajdz pasujace deep
    for(var j=0;j<candidates.length;j++){
      var rgb2=parseRgb(getComputedStyle(candidates[j]).backgroundColor);
      if(rgb2 && rgb2[0]+rgb2[1]+rgb2[2]<200){ // ciemny
        var match=findClosestPalette(rgb2);
        if(match) return match;
      }
    }
    return null;
  }
  function applyPalette(p){
    var r=document.documentElement;
    if(r.style.getPropertyValue('--audio-gold')===p.gold) return;
    r.style.setProperty('--audio-gold',p.gold);
    r.style.setProperty('--audio-deep','rgba('+p.deep[0]+','+p.deep[1]+','+p.deep[2]+',0.92)');
    var goldRgb=hexToRgb(p.gold);
    r.style.setProperty('--audio-gold-soft','rgba('+goldRgb+',0.55)');
  }
  function syncPalette(){
    var p=scanForDeepColor();
    if(p) applyPalette(p);
  }
  // Aggressive polling: 300ms (smooth-fade transition 0.4s nie pozwoli zauwazyc)
  setInterval(syncPalette,300);
  // Plus MutationObserver na CALE body (nie tylko #root)
  function bootObserver(){
    if(!document.body){setTimeout(bootObserver,100);return;}
    new MutationObserver(syncPalette).observe(document.body,{
      attributes:true, attributeFilter:['style','class'], subtree:true, childList:true
    });
  }
  bootObserver();
  // Pierwsze proby - krotkie, czeste, do czasu az React zaczyna renderowac
  [200,500,800,1200,2000,3000].forEach(function(t){setTimeout(syncPalette,t);});
})();
</script>
