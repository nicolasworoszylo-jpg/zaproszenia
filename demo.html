<!-- ATAK #2: ANTI-SERVICE-WORKER + cache cleanup (najwczesniej w head, BEFORE wszelkie inne scripty) -->
<script>
(function(){
  // Wykonaj BEZ czekania - od razu unregister wszystkie SW dla tej domeny
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(regs){
      if (regs.length > 0) {
        console.warn('[demo cache-buster] Found '+regs.length+' service workers - unregistering ALL');
        regs.forEach(function(r){ r.unregister(); });
      }
    }).catch(function(e){});
  }
  // Wyczysc wszystkie Cache Storage entries (Workbox, manual cache itd.)
  if ('caches' in window) {
    caches.keys().then(function(names){
      if (names.length > 0) {
        console.warn('[demo cache-buster] Clearing '+names.length+' cache storage entries');
        names.forEach(function(n){ caches.delete(n); });
      }
    }).catch(function(e){});
  }
})();
</script>

<!-- ━━━ AUDIO PLAYER (inline, niezalezny od React) z palette-aware colors ━━━ -->
<!-- Sam przycisk - bez podpisu textowego (aria-label dla SR pozostaje) -->
<div id="bg-audio-wrap" role="region" aria-label="Muzyka w tle">
  <audio id="bg-audio-el" src="/audio/demo.mp3" loop preload="none" playsinline crossorigin="anonymous"></audio>
  <button id="bg-audio-btn" type="button" aria-label="Włącz muzykę" title="Włącz muzykę">
    <svg id="bg-audio-icon-play" width="22" height="22" viewBox="0 0 24 24"><polygon class="audio-icon-shape" points="7,4 20,12 7,20" stroke-width="1.5"/></svg>
    <svg id="bg-audio-icon-pause" width="22" height="22" viewBox="0 0 24 24" style="display:none"><rect class="audio-icon-shape" x="6" y="4" width="4" height="16" rx="1" stroke-width="2" fill="none"/><rect class="audio-icon-shape" x="14" y="4" width="4" height="16" rx="1" stroke-width="2" fill="none"/></svg>
  </button>
</div>
<script>
(function(){
  var audio=document.getElementById('bg-audio-el');
  var btn=document.getElementById('bg-audio-btn');
  var iconPlay=document.getElementById('bg-audio-icon-play');
  var iconPause=document.getElementById('bg-audio-icon-pause');
  var wrap=document.getElementById('bg-audio-wrap');

  // ━━━ AUDIO toggle ━━━
  btn.addEventListener('click',function(){
    wrap.classList.add('no-pulse');
    if(audio.paused){
      audio.volume=0.35;
      var p=audio.play();
      if(p&&p.then) p.then(function(){
        iconPlay.style.display='none';iconPause.style.display='block';
        btn.setAttribute('aria-label','Wycisz muzykę');btn.setAttribute('title','Wycisz muzykę');
      }).catch(function(e){console.warn('[audio] play blocked:',e)});
    } else {
      audio.pause();
      iconPlay.style.display='block';iconPause.style.display='none';
      btn.setAttribute('aria-label','Włącz muzykę');btn.setAttribute('title','Włącz muzykę');
    }
  });
  setTimeout(function(){wrap.classList.add('no-pulse');},8000);

  // ━━━ PALETTE SYNC v4: celuj w aria-pressed="true" button palette switcher ━━━
  // React renderuje 4 buttony palety z onClick + aria-pressed.
  // Aktywny ma aria-pressed="true" + background: linear-gradient(135deg, FOREST 0%, GOLD 100%)
  // Parsujemy gradient -> ekstraktujemy forest + gold -> ustawiamy CSS variables.

  function rgbStr(r,g,b){return 'rgb('+r+','+g+','+b+')';}
  function hexToRgbStr(h){h=h.replace('#','');return rgbStr(parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16));}

  // Wyciąga 2 rgb z linear-gradient(135deg, rgb(r,g,b) 0%, rgb(r,g,b) 100%)
  function parseGradient(s){
    if(!s||s==='none') return null;
    var matches=s.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/g);
    if(!matches||matches.length<2) return null;
    var p=matches.map(function(m){
      var n=m.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
      return rgbStr(+n[1],+n[2],+n[3]);
    });
    return {forest:p[0], gold:p[1]};
  }

  function findActivePaletteBtn(){
    // Strategy 1: aria-pressed="true" na button (palette switcher)
    var btns=document.querySelectorAll('button[aria-pressed="true"]');
    for(var i=0;i<btns.length;i++){
      var bg=getComputedStyle(btns[i]).backgroundImage;
      if(bg && bg.indexOf('linear-gradient')>=0){
        return btns[i];
      }
    }
    // Strategy 2: button z aria-label "Zmień paletę:" + scale(1.2) lub box-shadow
    var allBtns=document.querySelectorAll('button[aria-label*="palet"]');
    for(var j=0;j<allBtns.length;j++){
      var cs=getComputedStyle(allBtns[j]);
      if(cs.transform && cs.transform.indexOf('1.2')>=0){
        return allBtns[j];
      }
    }
    return null;
  }

  function applyColors(forest, gold){
    var r=document.documentElement;
    if(r.style.getPropertyValue('--audio-gold')===gold) return; // idempotent
    r.style.setProperty('--audio-gold',gold);
    // deep = forest darkened (multiply 0.65) → rgba z alpha 0.92
    var m=forest.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if(m){
      var dr=Math.round(+m[1]*0.65), dg=Math.round(+m[2]*0.65), db=Math.round(+m[3]*0.65);
      r.style.setProperty('--audio-deep','rgba('+dr+','+dg+','+db+',0.92)');
    }
    // gold-soft = gold z alpha 0.55
    var gm=gold.match(/(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);
    if(gm) r.style.setProperty('--audio-gold-soft','rgba('+gm[1]+','+gm[2]+','+gm[3]+',0.55)');
  }

  function syncPalette(){
    var btn=findActivePaletteBtn();
    if(!btn) return;
    var bg=getComputedStyle(btn).backgroundImage;
    var p=parseGradient(bg);
    if(p) applyColors(p.forest, p.gold);
  }

  // Aggressive: poll co 300ms + MutationObserver na body (attribute changes)
  setInterval(syncPalette,300);
  function bootObserver(){
    if(!document.body){setTimeout(bootObserver,100);return;}
    new MutationObserver(syncPalette).observe(document.body,{
      attributes:true, attributeFilter:['aria-pressed','style','class'], subtree:true, childList:true
    });
  }
  bootObserver();
  // Initial burst - React renderuje w różnych momentach
  [200,500,800,1200,2000,3000,5000].forEach(function(t){setTimeout(syncPalette,t);});
})();
</script>
