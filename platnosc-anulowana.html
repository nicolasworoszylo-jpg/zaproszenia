<!DOCTYPE html>
<html lang="pl-PL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Płatność anulowana | zaproszeniaonline.com</title>
  <meta name="description" content="Płatność została anulowana. Możesz spróbować ponownie lub napisać do nas z pytaniem.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://zaproszeniaonline.com/platnosc-anulowana">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/fraunces.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/fonts/fonts.css">

  <style>
    :root {
      color-scheme: light;
      --bg: #FFFFFF; --ink: #0A0A0A; --ink-soft: #4A4A4A; --ink-mute: #999999;
      --line: #EBEBEB; --accent: #2C3E2D; --accent-h: #1E2B1F;
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Inter', system-ui, -apple-system, sans-serif;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      text-align: center; padding: 2rem 1.5rem;
      background: #FFFFFF;
      font-family: var(--sans); color: var(--ink);
    }
    .content { max-width: 540px; }
    .icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; opacity: 0.5; }
    .eyebrow { font-size: 0.78rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-mute); margin-bottom: 1rem; font-weight: 500; }
    h1 { font-family: var(--serif); font-style: italic; font-weight: 400; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.15; letter-spacing: -0.025em; margin-bottom: 1.25rem; }
    p { font-size: clamp(1rem, 2vw, 1.1rem); line-height: 1.65; color: var(--ink-soft); margin-bottom: 1rem; }
    .actions { display: flex; gap: 0.85rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 13px 26px; border-radius: 100px; text-decoration: none; font-size: 0.92rem; font-weight: 500; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { background: var(--accent-h); transform: translateY(-2px); }
    .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="content">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
    <p class="eyebrow">Płatność anulowana</p>
    <h1>Coś nie zagrało? <em style="color: var(--accent);">Bez paniki.</em></h1>
    <p>Płatność została anulowana — nic nie zostało pobrane z Twojego konta. To zdarza się każdemu.</p>
    <p>Jeśli chcesz spróbować ponownie lub masz pytanie przed zakupem — napisz, odpowiadamy w kilka godzin.</p>

    <div class="actions">
      <a href="/#cennik" class="btn btn-primary">
        Spróbuj ponownie
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
      <a href="mailto:kontakt@zaproszeniaonline.com" class="btn btn-ghost">Napisz do nas</a>
    </div>
  </div>
</body>
</html>
