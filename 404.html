<!DOCTYPE html>
<html lang="pl-PL">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">

  <meta name="robots" content="noindex, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Playfair+Display:ital,wght@1,400&family=Outfit:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem 1.5rem;
      background: linear-gradient(170deg, #1E2B1F 0%, #2C3E2D 50%, #1E2B1F 100%);
      color: #FAF6EF;
      font-family: 'Outfit', system-ui, sans-serif;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 45%, rgba(201,169,110,0.07), transparent 70%);
      pointer-events: none;
    }
    .corner { position: absolute; width: 70px; height: 70px; opacity: 0.4; pointer-events: none; }
    .corner.tl { top: 14px; left: 14px; }
    .corner.tr { top: 14px; right: 14px; transform: scaleX(-1); }
    .corner.bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
    .corner.br { bottom: 14px; right: 14px; transform: scale(-1, -1); }

    .content { position: relative; max-width: 540px; }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #C9A96E;
      margin-bottom: 1rem;
      font-weight: 500;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(3rem, 10vw, 6rem);
      line-height: 1;
      color: #C9A96E;
      margin-bottom: 0.25rem;
    }
    h2 {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1.4rem, 3vw, 1.8rem);
      color: #FAF6EF;
      margin-bottom: 1.25rem;
    }
    p {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1.1rem;
      color: rgba(250, 246, 239, 0.75);
      max-width: 420px;
      margin: 0 auto 2.5rem;
      line-height: 1.7;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: #C9A96E;
      color: #2A2622;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      border: 1px solid #C9A96E;
      transition: background 0.3s, transform 0.3s;
    }
    .btn:hover { background: #D4B97F; transform: translateY(-2px); }
    .btn svg { width: 16px; height: 16px; }

    @media (prefers-reduced-motion: reduce) {
      .btn:hover { transform: none; }
    }
  </style>
</head>
<body>

  <svg class="corner tr" viewBox="0 0 80 80" fill="none" stroke="#C9A96E" stroke-width="0.6"><path d="M4 76C4 40 12 20 24 12C36 4 56 2 76 4"/><circle cx="76" cy="4" r="1.5" fill="#C9A96E" fill-opacity="0.3"/></svg>
  <svg class="corner bl" viewBox="0 0 80 80" fill="none" stroke="#C9A96E" stroke-width="0.6"><path d="M4 76C4 40 12 20 24 12C36 4 56 2 76 4"/><circle cx="76" cy="4" r="1.5" fill="#C9A96E" fill-opacity="0.3"/></svg>
  <svg class="corner br" viewBox="0 0 80 80" fill="none" stroke="#C9A96E" stroke-width="0.6"><path d="M4 76C4 40 12 20 24 12C36 4 56 2 76 4"/><circle cx="76" cy="4" r="1.5" fill="#C9A96E" fill-opacity="0.3"/></svg>

  <div class="content">
    <p class="eyebrow">404</p>
    <h1>nie tędy droga</h1>
    <h2>Strona, której szukasz, nie istnieje lub została przeniesiona</h2>
    <p>Może wpisałeś niepoprawny adres, a może to my przeoczyliśmy szczegół. W każdym razie — wróć do nas.</p>
    <a href="/" class="btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Strona główna
    </a>
  </div>
</body>
</html>
