name: Supabase Keepalive

# ZAPOBIEGA pauzowaniu Supabase Free Tier (status INACTIVE po 7d bez aktywności).
# Pauza projektu = śmierć backend zaproszeniaonline (formularz, Stripe, maile).
#
# LESSON LEARNED 2026-06-08 → 2026-06-10:
#   Daily ping z poprzedniej wersji NIE WYSTARCZYŁ - Supabase pauzował mimo SQL query
#   przez MCP (service_role token może nie liczyć się jako "user activity").
#   Pauza zaszła ~2026-06-10, restore przez MCP restore_project (dane zachowane).
#
# UPDATE 2026-06-10 (GitGuardian alert): klucz przeniesiony do GitHub Secret
# żeby uspokoić skaner. Klucz to publishable/anon (publiczny by design - jest
# w index.html linia 3430), ale wzorzec `Authorization: Bearer <key>` jest
# flagowany heurystycznie. Best practice: secrets nawet dla "public" kluczy.
#
# STRATEGIA - 4× dziennie + 4 typy pingów + REAL anon API requests:
#   - cron 00:00, 06:00, 12:00, 18:00 UTC (co 6h)
#   - Ping 1: PostgREST query z ANON key (liczy się jako client request)
#   - Ping 2: Edge Function reachability (Edge Functions service)
#   - Ping 3: Storage bucket list (Storage service)
#   - Ping 4: Landing page (Vercel Analytics → indirect ping)
#   Każdy serwis Supabase ma osobny timer - lepiej je wszystkie aktywować.

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'   # 4× dziennie co 6h (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

env:
  SUPABASE_URL: https://kuyniyyieejvambyjnxy.supabase.co

jobs:
  ping:
    name: Multi-service ping
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Ping 1 - PostgREST with ANON key (Database + REST API service)
        env:
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          # SELECT z anon key = LICZY SIĘ jako user activity (kluczowe!)
          # discount_codes ma RLS public-read = bezpieczne dla anon
          RESP=$(curl -s -w "\nHTTP=%{http_code}" \
            "${SUPABASE_URL}/rest/v1/discount_codes?select=code&limit=1" \
            -H "apikey: ${ANON}" \
            -H "Authorization: Bearer ${ANON}")
          CODE=$(echo "$RESP" | tail -1 | cut -d= -f2)
          BODY=$(echo "$RESP" | head -n -1)
          echo "PostgREST: HTTP $CODE"
          echo "Body: ${BODY:0:150}"
          if [ "$CODE" != "200" ]; then
            echo "::error::PostgREST returned $CODE (expected 200)"
            exit 1
          fi

      - name: Ping 2 - Edge Function reachability (Edge Functions service)
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"keepalive":true,"ts":"'$(date -u +%s)'"}' \
            "${SUPABASE_URL}/functions/v1/stripe-webhook")
          echo "Edge Function: HTTP $CODE"
          # 400 = body bez signature (oczekiwane), 401 = brak auth (też OK), 200 = sukces
          if [ "$CODE" = "400" ] || [ "$CODE" = "401" ] || [ "$CODE" = "200" ]; then
            echo "✓ Edge Function reachable"
          else
            echo "::warning::Unexpected: $CODE"
          fi

      - name: Ping 3 - Storage bucket list (Storage service)
        env:
          ANON: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/storage/v1/bucket" \
            -H "apikey: ${ANON}" \
            -H "Authorization: Bearer ${ANON}")
          echo "Storage: HTTP $CODE"
          echo "✓ Storage service activated"

      - name: Ping 4 - Public landing page (Vercel Analytics ping)
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "Mozilla/5.0 (GitHub-Actions-Supabase-Keepalive)" \
            "https://zaproszeniaonline.com/")
          echo "Landing: HTTP $CODE"

      - name: Summary
        run: |
          echo "═══════════════════════════════════════════════"
          echo "✓ Supabase keepalive completed: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "═══════════════════════════════════════════════"
          echo "Next scheduled: za 6h"
          echo ""
          echo "Schedule: cron 0,6,12,18 UTC daily"
          echo "Total: 4 pingi/dzień × 4 typy = 16 reqs/dzień min"
          echo "Inactivity timer: NIGDY nie dojdzie do 7d"
